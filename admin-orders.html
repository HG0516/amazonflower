<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>주문 관리 — 꽃안부 관리자</title>
<link rel="stylesheet" href="/tokens.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif);background:var(--bg);color:var(--ink);line-height:1.5;font-size:15px;padding:0 0 40px;}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px;}
  header{text-align:center;padding:18px 0 4px;}
  h1{font-size:20px;font-weight:800;}
  .sub{font-size:13px;color:var(--ink-soft);margin-top:4px;}
  input[type=password]{width:100%;font-size:16px;padding:12px 13px;border:1px solid var(--line);border-radius:8px;background:#fcfbf8;color:var(--ink);font-family:inherit;}
  input:focus{outline:none;border-color:var(--accent);}
  .pwbar{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:12px;}
  .hint{font-size:12px;color:var(--ink-faint);margin-top:6px;}
  .summary{display:flex;gap:8px;margin-top:14px;}
  .sumcard{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center;}
  .sumcard .n{font-size:20px;font-weight:800;font-family:var(--font-display,inherit);}
  .sumcard .l{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .sumcard.urgent .n{color:#c0503f;}
  .bar{display:flex;gap:6px;overflow-x:auto;padding:12px 0 4px;-webkit-overflow-scrolling:touch;align-items:center;}
  .pill{white-space:nowrap;padding:7px 13px;border:1px solid var(--line);border-radius:20px;background:var(--paper);font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .refresh{margin-left:auto;background:var(--paper);border:1px solid var(--line);border-radius:20px;font-size:13px;font-weight:700;padding:7px 12px;cursor:pointer;color:var(--ink-soft);font-family:inherit;white-space:nowrap;}

  .order{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;}
  .order.urgent{border-color:#c0503f;box-shadow:0 0 0 1px #c0503f;}
  .o-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .o-name{font-size:17px;font-weight:800;}
  .o-name .to{font-size:12px;color:var(--ink-faint);font-weight:600;}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .b-new{background:#f0eee8;color:#7a766c;}
  .b-ordered{background:#e8f0ea;color:#1f4733;}
  .b-delivered{background:#eaf0f6;color:#355d8a;}
  .b-canceled{background:#fbecea;color:#9a3b2e;}
  .order.canceled{opacity:.62;}
  .b-urgent{background:#fbecea;color:#9a3b2e;margin-left:5px;}
  .o-prod{font-size:15px;font-weight:700;margin-top:8px;}
  .o-amt{color:var(--accent-deep,#1f4733);font-weight:800;}
  .o-rows{margin-top:8px;font-size:13px;color:var(--ink-soft);line-height:1.7;}
  .o-rows b{color:var(--ink);font-weight:700;}
  .o-rows .lbl{display:inline-block;min-width:52px;color:var(--ink-faint);}
  .o-ribbon{background:#faf8f2;border:1px solid var(--line-soft,#eeece4);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:13px;}
  .o-actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;}
  .o-actions button,.o-actions a{flex:1;min-width:92px;text-align:center;text-decoration:none;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--paper);color:var(--ink);}
  .o-actions .on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .o-actions .photo{background:#1f1d18;color:#fff;border-color:#1f1d18;}
  .o-meta{font-size:11px;color:var(--ink-faint);margin-top:9px;}
  .o-photo{margin-top:8px;}
  .o-photo img{max-width:120px;border-radius:8px;}
  .empty{text-align:center;color:var(--ink-faint);padding:40px 10px;font-size:14px;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:22px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;}
  .toast.show{opacity:1;} .toast.err{background:#9a3b2e;}
  .navlink{display:inline-block;margin-top:16px;font-size:13px;color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📋 주문 관리</h1>
    <div class="sub">들어온 주문을 보고, 준비중·배송완료로 표시해요.</div>
  </header>

  <div class="pwbar">
    <input type="password" id="pw" placeholder="관리자 비밀번호" autocomplete="current-password" />
    <div class="hint">갤러리·상품과 같은 비밀번호예요. 넣으면 주문이 바로 떠요.</div>
  </div>

  <a href="/admin-pay.html" style="display:block;text-align:center;margin-top:12px;padding:14px;background:var(--paper);border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-weight:800;font-size:16px;text-decoration:none;">💳 맞춤 결제 링크 만들기</a>

  <div class="summary" id="summary" style="display:none;"></div>
  <div class="bar" id="bar" style="display:none;"></div>
  <div id="list"></div>
  <a class="navlink" href="/admin-products.html">← 상품 관리</a>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const won = n => (Number(n)||0).toLocaleString()+"원";
const STLABEL = { new:"접수됨", ordered:"준비중", delivered:"배송완료", canceled:"취소됨" };
let ORDERS = [];
let curFilter = "all";

$("pw").value = localStorage.getItem("af_admin_pw") || "";
$("pw").addEventListener("change", () => { localStorage.setItem("af_admin_pw", $("pw").value); load(); });

function nowMs(){ return new Date().getTime(); }
function isUrgent(o){
  if(o.status==="delivered" || o.status==="canceled") return false;
  if(!o.event_at) return false;
  const t = new Date(o.event_at).getTime();
  if(isNaN(t)) return false;
  return t <= nowMs() + 6*3600000;   // 6시간 내(또는 이미 지남)
}
function fmtDateTime(o){
  const d = o.delivery_date || o.event_date || "";
  const t = o.delivery_time_slot || o.event_time || "";
  return [d, t].filter(Boolean).join(" ");
}
function fmtAddr(o){
  const road = [o.road_address, o.detail_address].filter(Boolean).join(" ");
  const bld = [o.building_name, o.room_info].filter(Boolean).join(" ");
  if(road) return [road, bld].filter(Boolean).join(" · ");
  return [o.venue, o.address].filter(Boolean).join(" ");
}

async function api(payload){
  const pw = $("pw").value.trim();
  if(!pw){ toast("비밀번호를 입력해주세요.","err"); return null; }
  const r = await fetch("/api/admin", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({password:pw, resource:"order", ...payload}) });
  const data = await r.json().catch(()=>({}));
  if(!r.ok){ toast("❌ "+(data.error||"오류"),"err"); return null; }
  localStorage.setItem("af_admin_pw", pw);
  return data;
}

async function load(){
  const data = await api({ action:"list" });
  if(!data) return;
  ORDERS = data.orders || [];
  render();
}

function render(){
  const undel = ORDERS.filter(o=>o.status!=="delivered" && o.status!=="canceled").length;
  const urg = ORDERS.filter(isUrgent).length;
  $("summary").style.display = "flex";
  $("summary").innerHTML =
    `<div class="sumcard"><div class="n">${ORDERS.length}</div><div class="l">전체 주문</div></div>`
    + `<div class="sumcard"><div class="n">${undel}</div><div class="l">미배송</div></div>`
    + `<div class="sumcard urgent"><div class="n">${urg}</div><div class="l">🔴 임박·지남</div></div>`;
  $("bar").style.display = "flex";
  const F = [["all","전체"],["new","접수"],["ordered","준비중"],["delivered","배송완료"],["urgent","🔴임박"],["corp","🏢 법인"],["stats","📊 통계"]];
  $("bar").innerHTML = F.map(([k,l])=>`<button class="pill ${curFilter===k?"on":""}" onclick="setFilter('${k}')">${l}</button>`).join("")
    + `<button class="refresh" onclick="load()">↻ 새로고침</button>`;

  if(curFilter==="stats"){ $("list").innerHTML = statsHtml(); return; }
  if(curFilter==="corp"){ $("list").innerHTML = corpHtml(); return; }

  let list = ORDERS.slice();
  if(curFilter==="urgent") list = list.filter(isUrgent);
  else if(curFilter!=="all") list = list.filter(o=>(o.status||"new")===curFilter);

  if(!list.length){ $("list").innerHTML = `<div class="empty">${ORDERS.length?"해당 주문이 없어요.":"아직 들어온 주문이 없어요. 🌸<br>주문이 결제되면 여기에 바로 떠요."}</div>`; return; }

  $("list").innerHTML = list.map(o=>{
    const st = o.status || "new";
    const urgent = isUrgent(o);
    const dt = fmtDateTime(o), addr = fmtAddr(o);
    const sender = o.ribbon_sender || o.sender_name || o.orderer_name || "";
    const phone = o.recipient_phone || "";
    const sPhone = o.sender_phone || o.orderer_phone || "";
    const ribbon = o.ribbon_text || o.ribbon || "";
    const req = o.request_note || o.note || "";
    const oid = esc(o.order_id||"");
    return `<div class="order ${urgent?'urgent':''} ${st==='canceled'?'canceled':''}">
      <div class="o-top">
        <div class="o-name">${esc(o.recipient_name||"(받는분 미상)")} <span class="to">받는 분</span></div>
        <div><span class="badge b-${st}">${STLABEL[st]||st}</span>${urgent?'<span class="badge b-urgent">임박</span>':''}</div>
      </div>
      <div class="o-prod">${esc(o.product_label||o.product_code||"주문")} · <span class="o-amt">${won(o.amount)}</span></div>
      <div class="o-rows">
        ${dt?`<div><span class="lbl">행사</span><b>${esc(dt)}</b></div>`:''}
        ${addr?`<div><span class="lbl">배송지</span>${esc(addr)}</div>`:''}
        ${phone?`<div><span class="lbl">받는분</span><a href="tel:${esc(phone)}">${esc(phone)}</a></div>`:''}
        ${sender?`<div><span class="lbl">보내는분</span>${esc(sender)}${sPhone?` · <a href="tel:${esc(sPhone)}">${esc(sPhone)}</a>`:''}</div>`:''}
        ${req?`<div><span class="lbl">요청</span>${esc(req)}</div>`:''}
      </div>
      ${ribbon?`<div class="o-ribbon">🎀 <b>리본</b> · ${esc(ribbon)}</div>`:''}
      ${o.completed_photo?`<div class="o-photo"><button onclick="viewPhoto('${oid}',this)" style="font-size:12px;color:#1f4733;font-weight:700;background:#e8f0ea;border:1px solid #1f4733;border-radius:7px;padding:6px 11px;cursor:pointer;font-family:inherit;">📷 올린 사진 보기</button></div>`:''}
      ${st==='canceled'?`<div class="o-actions"><div style="flex:1;text-align:center;padding:10px;font-size:13px;color:#9a3b2e;font-weight:700;">💸 환불 완료된 주문이에요${o.canceled_at?` (${String(o.canceled_at).slice(5,16).replace("T"," ")})`:''}</div></div>`:`<div class="o-actions">
        <button class="${st==='ordered'?'on':''}" onclick="setStatus('${oid}','ordered')">준비중</button>
        <button class="${st==='delivered'?'on':''}" onclick="setStatus('${oid}','delivered')">배송완료</button>
        <a class="photo" href="/admin-order.html?order=${encodeURIComponent(o.order_id||"")}">📷 직접 올리기</a>
        <button onclick="copyLink('${oid}',this)">🔗 기사 링크</button>
        <button style="color:#9a3b2e;border-color:#e5c4bf;" onclick="cancelOrder('${oid}',this)">💸 결제취소</button>
      </div>`}
      <div class="o-meta">주문번호 ${oid} · ${o.created_at?esc(String(o.created_at).slice(0,16).replace("T"," ")):""}</div>
    </div>`;
  }).join("");
}
function setFilter(k){ curFilter=k; render(); }

// ── 법인 거래처 ──
// 사업자번호 기준으로 묶는다(상호는 '(주)' 유무 등 표기가 흔들려 같은 회사가 갈린다).
function corpHtml(){
  const os=ORDERS.filter(o=>o.corp_name && o.status!=="canceled");
  if(!os.length) return `<div class="empty">아직 법인(계산서) 주문이 없어요.<br><span style="font-size:12px;">계산서로 주문이 들어오면 거래처별로 여기 모입니다.</span></div>`;
  const g={};
  for(const o of os){
    const k=o.corp_regno||o.corp_name;
    (g[k]=g[k]||{nm:o.corp_name,regno:o.corp_regno,email:o.corp_email,n:0,sum:0,last:null,orders:[]});
    g[k].n++; g[k].sum+=Number(o.paid_amount||o.amount)||0;
    if(!g[k].last||String(o.created_at)>String(g[k].last)) g[k].last=o.created_at;
    g[k].orders.push(o);
  }
  const list=Object.values(g).sort((a,b)=>b.sum-a.sum);
  const fmtNo=n=>n&&n.length===10?`${n.slice(0,3)}-${n.slice(3,5)}-${n.slice(5)}`:(n||"");
  const days=d=>d?Math.floor((nowMs()-new Date(d).getTime())/86400000):null;
  return `<div style="background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;">
      <div style="font-size:13px;color:var(--ink-soft);">거래처 <b style="color:var(--ink);">${list.length}곳</b> · 법인 주문 <b style="color:var(--ink);">${os.length}건</b> · 합계 <b style="color:var(--accent-deep,#1f4733);">${won(list.reduce((s,c)=>s+c.sum,0))}</b></div>
    </div>`
    + list.map(c=>{
      const d=days(c.last);
      const cold=d!=null&&d>=60;
      return `<div class="order">
        <div class="o-top">
          <div class="o-name">${esc(c.nm)} <span class="to">${esc(fmtNo(c.regno))}</span></div>
          <div><span class="badge ${c.n>=3?'b-ordered':'b-new'}">${c.n}건</span>${cold?'<span class="badge b-urgent">뜸함</span>':''}</div>
        </div>
        <div class="o-rows">
          <div><span class="lbl">누적</span><b>${won(c.sum)}</b> · 평균 ${won(Math.round(c.sum/c.n))}</div>
          <div><span class="lbl">최근</span>${c.last?esc(String(c.last).slice(0,10)):"-"}${d!=null?` (${d}일 전)`:""}</div>
          ${c.email?`<div><span class="lbl">계산서</span>${esc(c.email)}</div>`:''}
        </div>
        <div class="o-actions">
          <button onclick="copyCorpLink('${esc(c.regno||"")}',this)">🔗 전용 주문 링크</button>
          <button onclick="copyAcctLink('${esc(c.regno||"")}',this)">📋 계정·주문내역 링크</button>
        </div>
      </div>`;
    }).join("");
}
// 거래처 전용 링크 — 총무팀이 열면 상호·사업자번호·이메일이 채워진 채로 시작한다(입력 5칸 → 0칸).
async function copyCorpLink(regno, btn){
  if(!regno){ toast("사업자번호가 없는 거래처예요.","err"); return; }
  const old=btn.textContent; btn.textContent="만드는 중…"; btn.disabled=true;
  const data = await api({ action:"corplink", regno });
  btn.disabled=false;
  if(!data || !data.url){ btn.textContent=old; return; }
  try{ await navigator.clipboard.writeText(data.url); toast("링크 복사됨 — 거래처 담당자에게 보내세요 ✓"); btn.textContent="✓ 복사됨"; }
  catch(e){ prompt("이 링크를 거래처에 보내세요:", data.url); btn.textContent=old; }
}
// 거래처 계정·주문내역 링크 — 열면 corp.html 에서 자기 회사 지난 주문·계산서 확인 + 재주문(재발급 가능 토큰).
async function copyAcctLink(regno, btn){
  if(!regno){ toast("사업자번호가 없는 거래처예요.","err"); return; }
  const old=btn.textContent; btn.textContent="만드는 중…"; btn.disabled=true;
  const data = await api({ resource:"corp", action:"acctlink", regno });
  btn.disabled=false;
  if(!data || !data.url){ btn.textContent=old; return; }
  try{ await navigator.clipboard.writeText(data.url); toast("계정 링크 복사됨 — 거래처에 보내면 주문내역을 봅니다 ✓"); btn.textContent="✓ 복사됨"; }
  catch(e){ prompt("이 계정·주문내역 링크를 거래처에 보내세요:", data.url); btn.textContent=old; }
}

// ── 통계 ──
function statsHtml(){
  const os=ORDERS.filter(o=>o.status!=="canceled");
  const canceledCnt=ORDERS.length-os.length;
  const paid=os.reduce((s,o)=>s+(Number(o.paid_amount||o.amount)||0),0);
  const cnt=os.length, avg=cnt?Math.round(paid/cnt):0;
  const delivered=os.filter(o=>o.status==="delivered").length;
  const now=nowMs(); const d7=os.filter(o=>o.created_at && (now-new Date(o.created_at).getTime())<7*86400000).length;
  const ch={}; for(const o of os){ const k=o.utm_source||o.referral_source||"직접/기타"; ch[k]=(ch[k]||0)+1; }
  const cat={}; for(const o of os){ const k=o.category||o.order_type||"기타"; cat[k]=(cat[k]||0)+1; }
  const top=(obj)=>Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const bars=(arr)=>{ const max=Math.max(1,...arr.map(x=>x[1])); return arr.map(([k,v])=>`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px;"><div style="width:96px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft);">${esc(k)}</div><div style="flex:1;background:#f0ece3;border-radius:4px;height:15px;"><div style="width:${Math.round(v/max*100)}%;background:var(--accent);height:15px;border-radius:4px;"></div></div><div style="width:26px;text-align:right;font-weight:700;">${v}</div></div>`).join(""); };
  const cell=(n,l)=>`<div style="flex:1;"><div style="font-size:19px;font-weight:800;font-family:var(--font-display,inherit);">${n}</div><div style="font-size:11px;color:var(--ink-soft);margin-top:2px;">${l}</div></div>`;
  return `<div style="background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;">
    <div style="display:flex;gap:8px;text-align:center;">${cell(won(paid),"총 매출(결제액)")}${cell(cnt,"주문 수")}${cell(won(avg),"평균 객단가")}</div>
    <div style="display:flex;gap:8px;text-align:center;margin-top:14px;">${cell(d7,"최근 7일 주문")}${cell(delivered,"배송완료")}${cell(canceledCnt,"취소·환불")}</div>
    ${cnt?`<div style="font-size:13px;font-weight:800;margin-top:18px;">유입 채널</div>${bars(top(ch))}<div style="font-size:13px;font-weight:800;margin-top:16px;">상품 종류</div>${bars(top(cat))}`:'<div style="text-align:center;color:var(--ink-faint);padding:20px 0;font-size:13px;">주문이 쌓이면 매출·유입채널·인기상품 통계가 여기 나와요.</div>'}
  </div>`;
}

async function setStatus(orderId, status){
  const data = await api({ action:"status", orderId, status });
  if(!data) return;
  const o = ORDERS.find(x=>x.order_id===orderId);
  if(o){ o.status=status; if(status==="delivered") o.completed_at=o.completed_at||new Date().toISOString(); }
  render();
  toast(status==="delivered"?"배송완료로 표시했어요 ✓":"준비중으로 표시했어요 ✓");
}

async function cancelOrder(orderId, btn){
  const o = ORDERS.find(x=>x.order_id===orderId);
  const amt = o ? won(o.paid_amount||o.amount) : "";
  if(!confirm(`이 주문(${amt})의 결제를 취소(전액 환불)할까요?`)) return;
  if(!confirm("정말요? 되돌릴 수 없습니다. 손님 카드로 환불됩니다.")) return;
  const old=btn.textContent; btn.textContent="환불 중…"; btn.disabled=true;
  let data=null;
  try{ data = await api({ action:"cancel", orderId }); }
  catch(e){ toast("네트워크 오류 — 환불이 됐는지 새로고침으로 확인해주세요","err"); }
  btn.disabled=false; btn.textContent=old;
  if(!data) return;
  if(o){ o.status="canceled"; o.canceled_at=new Date().toISOString(); }
  render();
  if(data.alreadyCanceled) toast("이미 취소된 결제였어요 — 목록만 정리했어요");
  else toast(`✓ 결제취소 완료 — ${data.amount?data.amount.toLocaleString()+"원 ":""}환불 처리됐어요`+(data.dbSynced===false?" (목록 갱신 실패 — 새로고침)":""));
}

async function copyLink(orderId, btn){
  const old=btn.textContent; btn.textContent="링크 만드는 중…"; btn.disabled=true;
  const data = await api({ action:"link", orderId });
  btn.disabled=false;
  if(!data || !data.url){ btn.textContent=old; return; }
  try{ await navigator.clipboard.writeText(data.url); toast("링크 복사됨 — 배달 기사/파트너에게 카톡으로 보내세요 ✓"); btn.textContent="✓ 복사됨"; }
  catch(e){ prompt("이 링크를 복사해 기사에게 보내세요:", data.url); btn.textContent=old; }
}
async function viewPhoto(orderId, btn){
  btn.textContent="여는 중…"; btn.disabled=true;
  const data = await api({ action:"photo", orderId });
  if(!data || !data.url){ btn.textContent="📷 올린 사진 보기"; btn.disabled=false; return; }
  btn.parentElement.innerHTML = `<img src="${data.url}" alt="배송완료 사진" style="max-width:170px;border-radius:8px;">`;
}

let toastT=null;
function toast(msg,type){ const t=$("toast"); t.textContent=msg; t.className="toast show"+(type==="err"?" err":""); clearTimeout(toastT); toastT=setTimeout(()=>t.className="toast",2200); }

if($("pw").value) load();
</script>
