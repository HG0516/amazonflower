<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>상품 관리 — 꽃안부 관리자</title>
<link rel="stylesheet" href="/tokens.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif);background:var(--bg);color:var(--ink);line-height:1.55;font-size:16px;padding:0 0 60px;}
  .wrap{max-width:620px;margin:0 auto;padding:0 16px;}
  header{text-align:center;padding:20px 0 4px;}
  h1{font-size:20px;font-weight:800;}
  .sub{font-size:13px;color:var(--ink-soft);margin-top:5px;}
  input,textarea,button,select{font-family:inherit;}
  input[type=text],input[type=password],textarea{width:100%;font-size:16px;padding:12px 13px;border:1px solid var(--line);border-radius:8px;background:#fcfbf8;color:var(--ink);}
  textarea{resize:vertical;min-height:88px;line-height:1.6;}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);}
  .pwbar{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:14px;}
  .hint{font-size:12px;color:var(--ink-faint);margin-top:6px;}
  .tools{display:flex;gap:8px;margin-top:14px;}
  .tools input{flex:1;}
  .pills{display:flex;gap:6px;overflow-x:auto;padding:12px 0 4px;-webkit-overflow-scrolling:touch;}
  .pill{white-space:nowrap;padding:8px 14px;border:1px solid var(--line);border-radius:20px;background:var(--paper);font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* 고객 카탈로그와 동일한 카드 모양 (2열 그리드, 사진 3/4) */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
  .item{position:relative;text-align:left;cursor:pointer;}
  .item .photo{position:relative;aspect-ratio:3/4;background:var(--photo-bg,#f0ece3);border:1px solid var(--line);border-radius:var(--radius,10px);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:12px;}
  .item .photo img{width:100%;height:100%;object-fit:cover;object-position:center 40%;}
  .item[data-cat="congrats"] .photo img,.item[data-cat="condolence"] .photo img{object-fit:contain;padding:10px;}
  .item.sold .photo img{filter:grayscale(1);opacity:.55;}
  .item .nm{font-family:var(--font-display,inherit);font-weight:700;font-size:16px;color:var(--ink);margin-top:8px;}
  .item .nm-sub{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
  .item .price{font-family:var(--font-display,inherit);font-size:19px;font-weight:700;color:var(--ink);margin-top:3px;font-variant-numeric:tabular-nums;}
  .tag{position:absolute;top:7px;left:7px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
  .tag.sold{background:#fbecea;color:#9a3b2e;}
  .tag.edit{top:7px;left:auto;right:7px;background:#eef4ff;color:#2f5bd0;}
  .edit-hint{position:absolute;bottom:0;left:0;right:0;background:rgba(31,29,24,.72);color:#fff;font-size:11px;font-weight:700;text-align:center;padding:4px 0;border-radius:0 0 var(--radius,10px) var(--radius,10px);}

  /* 편집 시트 */
  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:50;}
  .sheet.open{display:flex;}
  .sheet-inner{background:var(--bg);width:100%;max-width:620px;margin:0 auto;border-radius:16px 16px 0 0;max-height:94vh;overflow-y:auto;padding:16px 16px 34px;}
  .sheet h2{font-size:16px;font-weight:800;}
  .sheet .pnm{font-size:12px;color:var(--ink-soft);margin-top:2px;}

  /* 손님 미리보기 (고객 상세화면과 동일 느낌) */
  .pv-wrap{margin-top:12px;border:1px solid var(--accent);border-radius:12px;overflow:hidden;background:var(--paper);}
  .pv-flag{background:var(--accent-soft,#eaf3ec);color:var(--accent-deep,#1f4733);font-size:12px;font-weight:800;padding:7px 12px;}
  .pv{padding:12px;}
  .pv-photo{aspect-ratio:1/1;background:var(--photo-bg,#f0ece3);border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:12px;}
  .pv-photo img{width:100%;height:100%;object-fit:cover;}
  .pv.contain .pv-photo img{object-fit:contain;padding:10px;}
  .pv-dots{text-align:center;margin-top:6px;font-size:11px;color:var(--ink-faint);}
  .pv-nm{font-family:var(--font-display,inherit);font-weight:800;font-size:19px;margin-top:10px;}
  .pv-sub{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .pv-meta{margin-top:6px;}
  .band-tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft,#eaf3ec);padding:2px 8px;border-radius:20px;}
  .kind-tag{font-size:11px;color:var(--ink-soft);background:#f0ece3;padding:2px 8px;border-radius:20px;margin-left:4px;}
  .pv-price{font-family:var(--font-display,inherit);font-size:22px;font-weight:800;margin-top:8px;}
  .pv-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.7;margin-top:8px;white-space:pre-line;}
  .pv-soldbar{background:#fbecea;color:#9a3b2e;font-weight:800;font-size:13px;text-align:center;padding:8px;}

  label{display:block;font-size:13px;font-weight:700;margin:16px 0 6px;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:11px;border:1px solid var(--line);border-radius:8px;background:var(--paper);font-size:15px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .seg button.on-sell{background:#eaf3ec;border-color:var(--accent);color:var(--accent-deep,#1f4733);}
  .seg button.on-sold{background:#fbecea;border-color:#c0503f;color:#9a3b2e;}
  .photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
  .ph{position:relative;width:76px;height:76px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .ph img{width:100%;height:100%;object-fit:cover;}
  .ph .x{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:12px;cursor:pointer;line-height:20px;}
  .ph .main{position:absolute;bottom:0;left:0;right:0;font-size:10px;text-align:center;background:rgba(0,0,0,.55);color:#fff;padding:1px 0;cursor:pointer;}
  .ph.first .main{background:var(--accent);cursor:default;}
  .addph{width:76px;height:76px;border:2px dashed var(--line);border-radius:8px;background:var(--paper);font-size:12px;color:var(--ink-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;}
  .pending{margin-top:10px;border:1px solid var(--accent);border-radius:10px;padding:10px;text-align:center;display:none;}
  .pending img{max-width:100%;max-height:220px;border-radius:8px;}
  .pending .prow{display:flex;gap:8px;margin-top:8px;}
  .pending .prow button{flex:1;padding:10px;border-radius:7px;border:1px solid var(--line);background:var(--paper);font-weight:600;font-size:14px;cursor:pointer;}
  .btn{width:100%;margin-top:20px;padding:15px;font-size:16px;font-weight:800;border:none;border-radius:9px;background:var(--accent);color:#fff;cursor:pointer;}
  .btn:disabled{background:var(--ink-faint);}
  .btn.ghost{background:var(--paper);color:var(--ink-soft);border:1px solid var(--line);margin-top:8px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:22px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;}
  .toast.show{opacity:1;}
  .toast.err{background:#9a3b2e;}
  canvas{display:none;}
  .navlink{display:inline-block;margin-top:16px;font-size:13px;color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📦 상품 관리</h1>
    <div class="sub">손님이 보는 화면 그대로예요. 상품을 눌러 설명·사진·품절을 바꿉니다. (가격은 여기서 안 바뀝니다)</div>
  </header>

  <div class="pwbar">
    <input type="password" id="pw" placeholder="관리자 비밀번호" autocomplete="current-password" />
    <div class="hint">갤러리·배송사진과 같은 비밀번호예요. 기기에 저장됩니다.</div>
  </div>

  <div class="tools"><input type="text" id="search" placeholder="상품 이름 검색" /></div>
  <div class="pills" id="pills"></div>
  <div class="grid" id="list"></div>
  <a class="navlink" href="/admin.html">← 갤러리 사진 올리기</a>
</div>

<!-- 편집 시트 -->
<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <h2 id="editTitle">상품 편집</h2>
    <div class="pnm" id="editPc"></div>

    <!-- 손님 미리보기 -->
    <div class="pv-wrap">
      <div class="pv-flag">👀 손님에게는 이렇게 보여요</div>
      <div id="preview"></div>
    </div>

    <label>한줄설명 <span style="font-weight:400;color:var(--ink-faint)">(이름 아래 작은 글씨)</span></label>
    <input type="text" id="fSubtitle" placeholder="예) 분홍 거베라 다발" />

    <label>상세설명 <span style="font-weight:400;color:var(--ink-faint)">(상품 눌렀을 때 자세히)</span></label>
    <textarea id="fDesc" placeholder="꽃 구성, 크기, 추천 상황 등을 자유롭게 적어주세요."></textarea>

    <label>판매상태</label>
    <div class="seg">
      <button type="button" id="segSell" onclick="setStatus('판매중')">판매중</button>
      <button type="button" id="segSold" onclick="setStatus('품절')">품절</button>
    </div>

    <label>사진 <span style="font-weight:400;color:var(--ink-faint)">(맨 앞이 대표사진)</span></label>
    <div class="photos" id="photos"></div>
    <input type="file" id="file" accept="image/*" style="display:none" />

    <div class="pending" id="pending">
      <img id="pendImg" alt="" />
      <div class="prow">
        <button type="button" onclick="rotatePending()">↻ 돌리기</button>
        <button type="button" onclick="cancelPending()">취소</button>
        <button type="button" onclick="confirmPending()" style="background:var(--accent);color:#fff;border-color:var(--accent);">이 사진 추가</button>
      </div>
    </div>

    <button class="btn" id="saveBtn" onclick="doSave()">저장</button>
    <button class="btn ghost" onclick="closeSheet()">닫기</button>
  </div>
</div>

<canvas id="canvas"></canvas>
<div class="toast" id="toast"></div>

<script src="/supabase-config.js"></script>
<script src="/products.js"></script>
<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// 고객 카탈로그와 동일한 카테고리 체계 (catalog.html AXES/catAxis 그대로)
const AXES = [
  {key:"basket",     label:"꽃다발·꽃바구니"},
  {key:"plant",      label:"관엽·식물"},
  {key:"orchid",     label:"난"},
  {key:"congrats",   label:"축하화환"},
  {key:"condolence", label:"근조화환"},
];
const AXIS_LABEL = {basket:"꽃다발·꽃바구니", plant:"관엽·식물", orchid:"난", congrats:"축하화환", condolence:"근조화환"};
const catAxis = (cat)=> (cat==="bouquet"||cat==="basket") ? "basket" : cat;   // 상품 cat → 탭키(고객과 동일)

let PRODUCTS = (window.PRODUCTS || []).map(p => ({...p, photos:(p.photos||[]).slice()}));
let overrides = {};
let curAxis = "";      // "" = 전체
let cur = null, pvIdx = 0;

$("pw").value = localStorage.getItem("af_admin_pw") || "";
$("pw").addEventListener("change", () => localStorage.setItem("af_admin_pw", $("pw").value));

async function loadOverrides(){
  if(!window.SUPA || !SUPA.url || !SUPA.anon) return;
  try{
    const r = await fetch(`${SUPA.url}/rest/v1/product_overrides?select=pc,subtitle,description,status,photos`,
      { headers:{ apikey:SUPA.anon, Authorization:`Bearer ${SUPA.anon}` } });
    if(!r.ok) return;
    for(const o of (await r.json())||[]){
      overrides[o.pc] = o;
      const p = PRODUCTS.find(x=>x.pc===o.pc); if(!p) continue;
      if(o.subtitle!=null) p.subtitle = o.subtitle;
      if(o.description!=null) p.description = o.description;
      if(o.status!=null) p.status = o.status;
      if(Array.isArray(o.photos)&&o.photos.length) p.photos = o.photos.slice();
    }
  }catch(e){}
  render();
}

function renderPills(){
  const axesPresent = AXES.filter(a => PRODUCTS.some(p => catAxis(p.cat)===a.key));
  $("pills").innerHTML =
    `<button class="pill ${curAxis===""?"on":""}" onclick="setAxis('')">전체</button>` +
    axesPresent.map(a=>`<button class="pill ${curAxis===a.key?"on":""}" onclick="setAxis('${a.key}')">${esc(a.label)}</button>`).join("");
}
function setAxis(k){ curAxis=k; render(); }

function render(){
  renderPills();
  const q = $("search").value.trim().toLowerCase();
  let list = PRODUCTS.filter(p => (!curAxis || catAxis(p.cat)===curAxis));
  if(q) list = list.filter(p => (p.name+" "+(p.subtitle||"")+" "+p.pc).toLowerCase().includes(q));
  $("list").innerHTML = list.map(p=>{
    const sold = p.status && p.status!=="판매중";
    const edited = !!overrides[p.pc];
    const photo = (p.photos&&p.photos[0])||"";
    return `<div class="item ${sold?'sold':''}" data-cat="${esc(p.cat)}" onclick="openEdit('${esc(p.pc)}')">
      <div class="photo">${photo?`<img src="${esc(photo)}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='사진 준비 중'">`:'사진 준비 중'}
        ${sold?'<span class="tag sold">품절</span>':''}${edited?'<span class="tag edit">수정됨</span>':''}
        <span class="edit-hint">✎ 눌러서 수정</span>
      </div>
      <div class="nm">${esc(p.name)}</div>
      <div class="nm-sub">${esc(p.subtitle||AXIS_LABEL[catAxis(p.cat)]||"")}</div>
      <div class="price">${(p.price||0).toLocaleString()}원</div>
    </div>`;
  }).join("") || `<div style="grid-column:1/-1;text-align:center;color:var(--ink-faint);padding:30px 0;">해당 상품이 없어요.</div>`;
}
$("search").addEventListener("input", render);

// ── 손님 미리보기 (고객 상세화면과 동일 느낌) ──
function renderPreview(){
  if(!cur) return;
  const p = PRODUCTS.find(x=>x.pc===cur.pc) || {};
  const photos = cur.photos.length ? cur.photos : [""];
  if(pvIdx >= photos.length) pvIdx = 0;
  const img = photos[pvIdx] || "";
  const sold = cur.status && cur.status!=="판매중";
  const contain = (p.cat==="congrats"||p.cat==="condolence");
  const kind = AXIS_LABEL[catAxis(p.cat)] || "";
  const desc = cur.description ? esc(cur.description)
    : "전 품목 정찰제 · 전국 당일배송. 계절·수급에 따라 사진과 일부 다를 수 있으며, 같은 등급 이상으로 정성껏 제작해 드립니다.";
  $("preview").innerHTML =
    (sold?`<div class="pv-soldbar">품절 — 손님이 주문할 수 없어요</div>`:``) +
    `<div class="pv ${contain?'contain':''}">
      <div class="pv-photo" ${photos.length>1?'onclick="pvNext()" style="cursor:pointer"':''}>${img?`<img src="${esc(img)}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='사진 준비 중'">`:'사진 준비 중'}</div>
      ${photos.length>1?`<div class="pv-dots" onclick="pvNext()" style="cursor:pointer">사진 ${pvIdx+1} / ${photos.length} · 눌러서 다음 ▸</div>`:``}
      <div class="pv-nm">${esc(p.name||"")}</div>
      ${cur.subtitle?`<div class="pv-sub">${esc(cur.subtitle)}</div>`:``}
      <div class="pv-meta"><span class="band-tag">${esc(p.band||"")}</span><span class="kind-tag">${esc(kind)}</span></div>
      <div class="pv-price">${(p.price||0).toLocaleString()}원</div>
      <div class="pv-desc">${desc}</div>
    </div>`;
}
function pvNext(){ const n=(cur.photos.length||1); pvIdx=(pvIdx+1)%n; renderPreview(); }

// ── 편집 시트 ──
function openEdit(pc){
  const p = PRODUCTS.find(x=>x.pc===pc); if(!p) return;
  cur = { pc, subtitle:p.subtitle||"", description:p.description||"", status:p.status||"판매중", photos:(p.photos||[]).slice() };
  pvIdx = 0;
  $("editTitle").textContent = p.name;
  $("editPc").textContent = pc + " · " + (AXIS_LABEL[catAxis(p.cat)]||p.cat) + " · " + (p.price||0).toLocaleString() + "원";
  $("fSubtitle").value = cur.subtitle;
  $("fDesc").value = cur.description;
  setStatus(cur.status);
  renderPhotos(); renderPreview(); cancelPending();
  $("sheet").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeSheet(){ $("sheet").classList.remove("open"); document.body.style.overflow=""; cur=null; cancelPending(); }
function setStatus(s){
  if(cur) cur.status = s;
  $("segSell").className = s==="판매중" ? "on-sell" : "";
  $("segSold").className = s==="품절" ? "on-sold" : "";
  renderPreview();
}
// 입력하면 미리보기 즉시 갱신
$("fSubtitle").addEventListener("input", ()=>{ if(cur){ cur.subtitle=$("fSubtitle").value; renderPreview(); } });
$("fDesc").addEventListener("input", ()=>{ if(cur){ cur.description=$("fDesc").value; renderPreview(); } });

function renderPhotos(){
  $("photos").innerHTML = cur.photos.map((u,i)=>`
    <div class="ph ${i===0?'first':''}">
      <img src="${esc(u)}" alt="" onerror="this.style.visibility='hidden'">
      <button class="x" onclick="delPhoto(${i})" title="삭제">✕</button>
      <div class="main" ${i===0?'':`onclick="makeMain(${i})"`}>${i===0?'대표':'대표로'}</div>
    </div>`).join("")
    + (cur.photos.length<8 ? `<div class="addph" onclick="$('file').click()">＋ 사진<br>추가</div>` : "");
}
function delPhoto(i){ cur.photos.splice(i,1); if(pvIdx>=cur.photos.length) pvIdx=0; renderPhotos(); renderPreview(); }
function makeMain(i){ const [x]=cur.photos.splice(i,1); cur.photos.unshift(x); pvIdx=0; renderPhotos(); renderPreview(); }

// ── 사진 추가(회전·압축) ──
let pImg=null, pRot=0;
$("file").addEventListener("change", e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ pImg=new Image(); pImg.onload=()=>{ pRot=0; drawPending(); }; pImg.src=rd.result; };
  rd.readAsDataURL(f); e.target.value="";
});
function drawPending(){
  if(!pImg) return;
  const maxd=1080, scale=Math.min(1, maxd/Math.max(pImg.width,pImg.height));
  const sw=Math.round(pImg.width*scale), sh=Math.round(pImg.height*scale);
  const r=((pRot%360)+360)%360, swap=(r===90||r===270);
  const cv=$("canvas"); cv.width=swap?sh:sw; cv.height=swap?sw:sh;
  const ctx=cv.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.save(); ctx.translate(cv.width/2,cv.height/2); ctx.rotate(r*Math.PI/180);
  ctx.drawImage(pImg,-sw/2,-sh/2,sw,sh); ctx.restore();
  $("pendImg").src=cv.toDataURL("image/jpeg",0.85);
  $("pending").style.display="block";
}
function rotatePending(){ pRot+=90; drawPending(); }
function cancelPending(){ pImg=null; pRot=0; $("pending").style.display="none"; }
async function confirmPending(){
  if(!pImg) return;
  let b64=$("canvas").toDataURL("image/jpeg",0.85);
  if(b64.length>3500000) b64=$("canvas").toDataURL("image/jpeg",0.6);
  await doSave(b64);
  cancelPending();
}

// ── 저장 ──
async function doSave(newPhotoBase64){
  const pw=$("pw").value.trim();
  if(!pw) return toast("비밀번호를 입력해주세요.","err");
  if(!cur) return;
  cur.subtitle=$("fSubtitle").value.trim();
  cur.description=$("fDesc").value.trim();
  const payload={ password:pw, pc:cur.pc, subtitle:cur.subtitle, description:cur.description, status:cur.status, photos:cur.photos };
  if(newPhotoBase64) payload.newPhotoBase64=newPhotoBase64;
  $("saveBtn").disabled=true; $("saveBtn").textContent="저장 중…";
  try{
    const r=await fetch("/api/product-edit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const data=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(data.error||"저장 실패");
    localStorage.setItem("af_admin_pw",pw);
    const item=data.item||{};
    if(Array.isArray(item.photos)) cur.photos=item.photos.slice();
    overrides[cur.pc]=item;
    const p=PRODUCTS.find(x=>x.pc===cur.pc);
    if(p){ p.subtitle=cur.subtitle||p.subtitle; p.description=cur.description; p.status=cur.status; if(cur.photos.length) p.photos=cur.photos.slice(); }
    renderPhotos(); renderPreview(); render();
    toast(newPhotoBase64 ? "사진을 추가했어요 ✓" : "저장했어요 ✓");
  }catch(e){ toast("❌ "+(e.message||"저장 실패"),"err"); }
  finally{ $("saveBtn").disabled=false; $("saveBtn").textContent="저장"; }
}

let toastT=null;
function toast(msg,type){ const t=$("toast"); t.textContent=msg; t.className="toast show"+(type==="err"?" err":""); clearTimeout(toastT); toastT=setTimeout(()=>t.className="toast",2200); }

render();
loadOverrides();
</script>
</body>
</html>
