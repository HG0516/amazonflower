<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>꽃안부 — 연결이 끊겼어요</title>
<meta name="theme-color" content="#2d4a38" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Gowun Batang", -apple-system, "Apple SD Gothic Neo", sans-serif;
    background: #f7f4ee; color: #1f1d18; line-height: 1.7;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .box { max-width: 360px; }
  .mark { width: 84px; height: 84px; margin: 0 auto 22px; display: block; opacity: 0.9; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  p { color: #5a564d; font-size: 15px; margin-bottom: 8px; }
  .btn {
    display: inline-block; margin-top: 22px; padding: 14px 26px;
    background: #2d4a38; color: #fff; border: none; border-radius: 6px;
    font-size: 16px; font-weight: 700; text-decoration: none; cursor: pointer;
    font-family: inherit;
  }
  .tel {
    display: inline-block; margin-top: 14px; padding: 13px 24px;
    border: 1px solid #d9d3c4; border-radius: 6px; color: #1f1d18;
    font-size: 15px; text-decoration: none;
  }
  .hint { font-size: 13px; color: #9e9a8f; margin-top: 18px; }
</style>
</head>
<body>
  <div class="box">
    <img class="mark" src="/icons/icon-192.png" alt="꽃안부" />
    <h1>잠시 연결이 끊겼어요</h1>
    <p>인터넷이 불안정한 것 같아요.<br>연결을 확인하고 다시 시도해 주세요.</p>
    <br />
    <a class="btn" href="/" onclick="location.reload(); return false;">다시 시도</a>
    <br />
    <a class="tel" href="tel:0313143003">📞 전화로 주문 · 031-314-3003</a>
    <p class="hint">급하신 주문은 전화 주시면 바로 도와드립니다.</p>
  </div>
  <script>
    // 온라인 복귀 시 자동 새로고침
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
